services:
  # Web Service — CMS Blazor Server App
  - type: web
    name: vinhkhanhtour-cms
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: vinhkhanhtour-db
          property: connectionString
      - key: AdminAccount__Username
        value: admin
      - key: AdminAccount__Password
        sync: false  # Render sẽ yêu cầu nhập khi deploy
      - key: Gemini__ApiKey
        sync: false  # Nhập API key riêng trên Render Dashboard

databases:
  - name: vinhkhanhtour-db
    plan: free
    databaseName: vinhkhanhtour
    user: vinhkhanhtour_user
